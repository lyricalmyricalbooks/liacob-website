<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Luciano Iacobelli</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<script src="../nav.js"></script>

<div class="page-header contact-header">
  <h1>Contact</h1>
</div>

<section class="contact-section">
  <p>If you have any questions, comments, or feedback, please feel free to get in touch with me. I'd love to hear from you!</p>
  <p style="margin-top: 2rem;">Thank you for your interest, and I look forward to hearing from you soon.</p>

  <form class="contact-form" action="mailto:Lyricalmyricalbooks@gmail.com" method="POST" enctype="text/plain">
    <div class="contact-form-grid">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="Name" placeholder="Name" required>
      </div>

      <div class="field">
        <label for="email">Email *</label>
        <input type="email" id="email" name="Email" placeholder="Email" required>
      </div>
    </div>

    <div class="field">
      <label for="phone">Phone number</label>
      <input type="tel" id="phone" name="Phone number" placeholder="Phone number">
    </div>

    <div class="field">
      <label for="comment">Comment</label>
      <textarea id="comment" name="Comment" placeholder="Comment" required></textarea>
    </div>

    <button type="submit" class="btn-primary">Send</button>
  </form>
</section>

</body>
</html>
